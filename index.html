<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure AI Academy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Azure AI Academy</h1>
</header>

<div class="container">

    <div class="sidebar">
        <input
            type="text"
            id="search"
            placeholder="Search Certification">

        <div id="menu"></div>
    </div>

    <div class="main">

        <div id="dashboard">
            Select a certification track
        </div>

        <div id="content">
            <h2>Welcome</h2>
            <p>
                Select AZ-900, AI-900, AZ-104 or AZ-305.
            </p>
        </div>

        <div class="actions">
            <button id="revisionBtn">
                Revision
            </button>

            <button id="quizBtn">
                Quiz
            </button>
        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
