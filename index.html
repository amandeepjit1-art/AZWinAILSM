<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Azure & Windows AI Academy</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="styles.css"></head><body class="bg-slate-100"><nav class="bg-blue-700 text-white p-4 shadow"><div class="max-w-7xl mx-auto flex justify-between"><h1 class="text-2xl font-bold">Azure & Windows AI Academy</h1><button id="themeBtn" class="bg-white text-blue-700 px-3 py-1 rounded">Dark Mode</button></div></nav><div class="max-w-7xl mx-auto grid md:grid-cols-4 gap-6 p-6"><aside class="bg-white rounded-xl shadow p-4"><input id="search" placeholder="Search Certification" class="w-full border rounded p-2 mb-4"><div id="courseMenu"></div></aside><main class="md:col-span-3"><div class="grid md:grid-cols-4 gap-4 mb-6"><div class="card"><h3>Total Tracks</h3><p id="totalTracks">4</p></div><div class="card"><h3>Completed</h3><p id="completedCount">0</p></div><div class="card"><h3>Average Score</h3><p id="avgScore">0%</p></div><div class="card"><h3>Certificates</h3><p id="certCount">0</p></div></div><div id="contentArea" class="bg-white rounded-xl shadow p-6">Select a certification.</div></main></div><script src="app.js"></script></body></html>
